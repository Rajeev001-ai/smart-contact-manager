<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>SCM Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap & FontAwesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg-main: #f8f9fa;
      --text-main: #212529;
      --card-bg: #ffffff;
      --sidebar-bg: #0b1d3a;
      --navbar-bg: #0d2c54;
    }

    body.dark-mode {
      --bg-main: #1c1e26;
      --text-main: #f1f1f1;
      --card-bg: #2b2d42;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      transition: all 0.3s ease;
    }

    .navbar {
      background-color: var(--navbar-bg);
    }

    .navbar .navbar-brand,
    .navbar .nav-link,
    .navbar button {
      color: #fff;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 240px;
      background-color: var(--sidebar-bg);
      padding-top: 70px;
      transition: transform 0.3s ease;
      z-index: 1000;
    }

    .sidebar a {
      display: block;
      padding: 15px 25px;
      color: white;
      text-decoration: none;
    }

    .sidebar a:hover {
      background-color: #1f4068;
    }

    .sidebar .user-profile {
      text-align: center;
      margin-bottom: 20px;
    }

    .sidebar .user-profile img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #a8dadc;
    }

    .sidebar .user-profile h6 {
      color: #f1faee;
      margin-top: 10px;
    }

    .main-content {
      margin-left: 240px;
      padding: 80px 20px 20px 20px;
      transition: margin-left 0.3s ease;
    }

    .toggle-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 22px;
      color: #fff;
      cursor: pointer;
      z-index: 1100;
    }

    @media (min-width: 768px) {
      .toggle-btn {
        display: none;
      }
    }

    @keyframes fadeInUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .welcome-box {
      animation: fadeInUp 1s ease-out;
      background: linear-gradient(135deg, #a8dadc, #f1faee);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      margin-bottom: 30px;
    }

    .card-animate {
      animation: fadeInUp 1s ease-out;
      animation-delay: 0.2s;
      animation-fill-mode: both;
      background-color: var(--card-bg);
      border: none;
    }

    .form-check .form-check-input {
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- Toggle Button for Sidebar (small screens only) -->
  <div class="toggle-btn d-md-none" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
  </div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
    <div class="container-fluid px-4">
      <a class="navbar-brand fw-bold" href="#">SCM 2.0</a>

      <div class="ms-auto d-flex align-items-center gap-3">
        <!-- Dark mode toggle -->
        <div class="form-check form-switch text-light">
          <input class="form-check-input" type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
          <label class="form-check-label" for="darkModeToggle">Dark Mode</label>
        </div>

        <!-- User -->
        <div>
          <img th:src="@{/image/default.png}" class="rounded-circle" style="width:32px; height:32px;" alt="user">
          <span class="text-light fw-semibold ms-2" th:text="${user.name}">User</span>
        </div>

        <a class="btn btn-outline-light btn-sm" th:href="@{/logout}">Logout</a>
      </div>
    </div>
  </nav>

   <div class="sidebar" id="sidebar">
        <div class="user-profile">
            <img th:src="@{/image/default.png}" alt="Profile">
            <h6 th:text="${user.name}">User Name</h6>
        </div>
        <a th:href="@{/user/dashboard}"><i class="fa-solid fa-chart-line me-2"></i> Dashboard</a>
        <a th:href="@{/user/profile}"><i class="fa-solid fa-user me-2"></i> Profile</a>
        <a th:href="@{/user/myContact}"><i class="fa-solid fa-address-book me-2"></i> My Contacts</a>
        <a th:href="@{/user/addContact}"><i class="fa-solid fa-user-plus me-2"></i> Add Contact</a>
        <a th:href="@{/user/setting}"><i class="fa-solid fa-gear me-2"></i> Settings</a>
        <a th:href="@{/user/chatBot}"><i class="fa-solid fa-gear me-2"></i> ChatBot</a>
        <a th:href="@{/logout}"><i class="fa-solid fa-sign-out-alt me-2"></i> Logout</a>
    </div>

    <!-- Inside Main Content -->
    <div class="main-content " id="mainContent" style="margin-left: 500px;" >
      
      <div style="margin-left: 130px;">
         <h1 class="mb-4">User Profile</h1>
      </div>
     

      <!-- Animated Profile Card -->
      <div class="card card-animate shadow p-4" style="max-width: 500px;">
        <div class="d-flex align-items-center gap-3">
          <img th:src="@{/image/default.png}" alt="User" class="rounded-circle border"
            style="width: 80px; height: 80px;">
          <div>
            <h5 class="mb-1" th:text="${user.name}">User Name</h5>
            <p class="mb-0 text-muted" th:text="${user.email}">user@example.com</p>
          </div>
        </div>
        <hr>
        <div>
          <p><strong>Phone Number:</strong> <span th:text="${user.phoneNumber}">Phone</span></p>
          <p><strong>About:</strong> <span th:text="${user.about}">Phone</span></p>
        </div>
        <div class="text-end">
          <a class="btn btn-sm btn-primary"><i
              class="fa-solid fa-pen-to-square me-1"></i> Edit Profile</a>
        </div>
      </div>
    </div>


  <!-- Scripts -->
  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      const mainContent = document.getElementById("mainContent");
      sidebar.classList.toggle("active");
      mainContent.classList.toggle("shifted");
    }

    function toggleDarkMode() {
      document.body.classList.toggle("dark-mode");
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
