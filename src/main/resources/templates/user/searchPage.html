<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>SCM Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap & FontAwesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg-main: #f8f9fa;
      --text-main: #212529;
      --card-bg: #ffffff;
      --sidebar-bg: #0b1d3a;
      --navbar-bg: #0d2c54;
    }

    body.dark-mode {
      --bg-main: #1c1e26;
      --text-main: #f1f1f1;
      --card-bg: #2b2d42;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      transition: all 0.3s ease;
    }

    .navbar {
      background-color: var(--navbar-bg);
    }

    .navbar .navbar-brand,
    .navbar .nav-link,
    .navbar button {
      color: #fff;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 240px;
      background-color: var(--sidebar-bg);
      padding-top: 70px;
      transition: transform 0.3s ease;
      z-index: 1000;
    }

    .sidebar a {
      display: block;
      padding: 15px 25px;
      color: white;
      text-decoration: none;
    }

    .sidebar a:hover {
      background-color: #1f4068;
    }

    .sidebar .user-profile {
      text-align: center;
      margin-bottom: 20px;
    }

    .sidebar .user-profile img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #a8dadc;
    }

    .sidebar .user-profile h6 {
      color: #f1faee;
      margin-top: 10px;
    }

    .main-content {
      margin-left: 240px;
      padding: 80px 20px 20px 20px;
      transition: margin-left 0.3s ease;
    }

    .toggle-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 22px;
      color: #fff;
      cursor: pointer;
      z-index: 1100;
    }

    @media (min-width: 768px) {
      .toggle-btn {
        display: none;
      }
    }

    @keyframes fadeInUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .welcome-box {
      animation: fadeInUp 1s ease-out;
      background: linear-gradient(135deg, #a8dadc, #f1faee);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      margin-bottom: 30px;
    }

    .card-animate {
      animation: fadeInUp 1s ease-out;
      animation-delay: 0.2s;
      animation-fill-mode: both;
      background-color: var(--card-bg);
      border: none;
    }

    .form-check .form-check-input {
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Toggle Button for Sidebar (small screens only) -->
  <div class="toggle-btn d-md-none" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
  </div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
    <div class="container-fluid px-4">
      <a class="navbar-brand fw-bold" href="#">SCM 2.0</a>

      <div class="ms-auto d-flex align-items-center gap-3">
        <!-- Dark mode toggle -->
        <div class="form-check form-switch text-light">
          <input class="form-check-input" type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
          <label class="form-check-label" for="darkModeToggle">Dark Mode</label>
        </div>

        <!-- User -->
        <div>
          <img th:src="@{/image/default.png}" class="rounded-circle" style="width:32px; height:32px;" alt="user">
          <span class="text-light fw-semibold ms-2" th:text="${user.name}">User</span>
        </div>

        <a class="btn btn-outline-light btn-sm" th:href="@{/logout}">Logout</a>
      </div>
    </div>
  </nav>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="user-profile">
      <img th:src="@{/image/default.png}" alt="Profile">
      <h6 th:text="${user.name}">User Name</h6>
    </div>
    <a th:href="@{/user/dashboard}"><i class="fa-solid fa-chart-line me-2"></i> Dashboard</a>
    <a th:href="@{/user/profile}"><i class="fa-solid fa-user me-2"></i> Profile</a>
    <a th:href="@{/user/myContact}"><i class="fa-solid fa-address-book me-2"></i> My Contacts</a>
    <a th:href="@{/user/addContact}"><i class="fa-solid fa-user-plus me-2"></i> Add Contact</a>
    <a th:href="@{/user/setting}"><i class="fa-solid fa-gear me-2"></i> Settings</a>
    <a th:href="@{/logout}"><i class="fa-solid fa-sign-out-alt me-2"></i> Logout</a>
  </div>

  <!-- Main Content -->
  <section id="mainContent" class="main-content">
    <div class="d-flex justify-content-center align-items-center mb-4">
      <h1>My All Contacts</h1>
    </div>

    <div class="container">
      <div th:if="${session.message}" th:object="${session.message}">
        <div class="alert alert-success" role="alert">
          <p th:text="*{content}"></p>
        </div>
        <th:block th:text="${@sessionHelper.removeMessage()}"></th:block>
      </div>

      <div class="mb-4">
        <form class="d-flex flex-wrap gap-2" method="get" role="search" th:action="@{/user/contacts/search}">
          <select name="field" class="form-select" style="max-width: 150px;">
            <option selected>Select Field</option>
            <option value="name">Name</option>
            <option value="phone">Phone</option>
            <option value="email">Email</option>
          </select>

          <input name="keyword" class="form-control" type="search" placeholder="Search" aria-label="Search" style="flex:1;" />

          <button class="btn btn-outline-success" type="submit">Search</button>
          <button class="btn btn-outline-danger" type="button" onclick="exportData()">Export</button>
        </form>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle animate__animated animate__fadeInUp" id="contact-table">
          <thead class="table-dark">
            <tr>
              <th scope="col">SCMID</th>
              <th scope="col">Image</th>
              <th scope="col">Name</th>
              <th scope="col">Email</th>
              <th scope="col">Ph.No</th>
              <th scope="col">Social Links</th>
              <th scope="col">Action</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="c : ${pageContact.getContent()}" th:object="${c}" class="animate__animated animate__fadeInUp">
              <th scope="row" th:text="'SCM'+*{id}"></th>
              <td><img th:src="@{*{picture}}" alt="" class="rounded-circle" style="width: 50px; height: 50px;"></td>
              <td th:text="*{name}"></td>
              <td th:text="*{email}"></td>
              <td th:text="*{phoneNumber}"></td>
              <td>
                <a th:href="*{linkedinLink}" class="text-decoration-none me-2"><i class="fa-brands fa-linkedin"></i></a>
                <a th:href="*{websiteLink}" class="text-decoration-none"><i class="fa-brands fa-facebook"></i></a>
              </td>
              <td>
                <a th:href="@{'/user/updateContact/'+*{id}}" class="text-primary me-2"><i class="fa-solid fa-pencil"></i></a>
                <button th:onclick="deleteContact([[*{id}]])" class="btn btn-sm btn-link text-danger p-0"><i class="fa-solid fa-trash"></i></button>
                <a th:href="@{'/user/viewContact/'+*{id}}" class="text-success ms-2"><i class="fa-solid fa-eye"></i></a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <nav aria-label="Page navigation example" class="mt-4">
        <ul class="pagination justify-content-center">
          <li class="page-item" th:unless="${pageContact.first}">
            <a class="page-link" th:href="@{'/user/myContact?size='+${pageSize}+ '&page='+${pageContact.number-1}}">Previous</a>
          </li>
          <li class="page-item" th:each=" index : ${#numbers.sequence(0,pageContact.totalPages-1)}">
            <a class="page-link" th:classappend="${index == pageContact.number ? 'bg-primary text-white' : ''}" th:href="@{'/user/myContact?size='+${pageSize}+'&page='+${index}}" th:text="${index+1}"></a>
          </li>
          <li class="page-item" th:unless="${pageContact.last}">
            <a class="page-link" th:href="@{'/user/myContact?size='+${pageSize}+ '&page='+${pageContact.number+1}}">Next</a>
          </li>
        </ul>
      </nav>
    </div>
  </section>

  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      const mainContent = document.getElementById("mainContent");
      sidebar.classList.toggle("active");
      mainContent.classList.toggle("shifted");
    }

    function toggleDarkMode() {
      document.body.classList.toggle("dark-mode");
    }

    function exportData() {
      var uri = 'data:application/vnd.ms-excel;base64,',
        template = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>{worksheet}</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml></head><body><table>{table}</table></body></html>',
        base64 = function (s) { return window.btoa(unescape(encodeURIComponent(s))) },
        format = function (s, c) { return s.replace(/{(\w+)}/g, function (m, p) { return c[p]; }) }
      var toExcel = document.getElementById("contact-table").innerHTML;
      var ctx = { worksheet: 'Contacts', table: toExcel };
      var link = document.createElement("a");
      link.download = "export.xls";
      link.href = uri + base64(format(template, ctx));
      link.click();
    }

    async function deleteContact(id) {
      Swal.fire({
        title: "Are you sure?",
        text: "You won't be able to revert this!",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#3085d6",
        cancelButtonColor: "#d33",
        confirmButtonText: "Yes, delete it!"
      }).then((result) => {
        if (result.isConfirmed) {
          const url = `http://localhost:8081/user/deleteContact/` + id;
          window.location.replace(url);
          Swal.fire({ title: "Deleted!", text: "Your contact has been deleted.", icon: "success" });
        }
      });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
