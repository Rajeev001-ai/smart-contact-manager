<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="parent(content)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Base page</title>
</head>

<body>

    <!--Nav bar-->


    <div>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <img th:src="@{'/image/scm20.png'}" alt="" width="20px" height="20px">
                <a class="navbar-brand fw-bold" href="#">SCM2.0</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" th:href="@{/home}">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/about}">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/service}">Services</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/contact}">Contact</a>
                        </li>

                    </ul>

                    <div th:if="${user}">
                        <div class="d-flex gap-3">
                            <div>
                                <img th:src="@{/image/default.png}" alt="" style="width:30px; height:30px;">

                                <button class="btn bg-primary btn-sm">
                                    <a class="text-light fw-bold" th:href="@{/user/profile}"
                                        style="text-decoration: none;" th:text="${user.name}">User</a>
                                </button>
                            </div>
                            <div>
                                <button class="btn bg-danger btn-sm">
                                    <a class="text-light fw-bold bg-danger" th:href="@{/logout}"
                                        style="text-decoration: none;">Logout</a>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div th:unless="${user}">
                        <button class="btn bg-primary btn-sm">
                            <a class="text-light fw-bold" th:href="@{/login}" style="text-decoration: none;">Login</a>
                        </button>
                        <button class="btn bg-danger btn-sm">
                            <a class="text-light fw-bold" th:href="@{/signup}" style="text-decoration: none;">Signup</a>
                        </button>
                    </div>


                </div>
            </div>
        </nav>
    </div>


    <div th:replace="${content}">



    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
</body>

</html>
